id: https://w3id.org/lmodel/fluxnova-bpm-platform/provenance
name: fluxnova_bpm_provenance
title: Fluxnova BPM Provenance
description: |-
  PROV-aligned LinkML schema for provenance of Fluxnova BPM workflow definitions and runs.
  Provides prospective provenance (definitions) and retrospective provenance (executions)
  separately, mirroring Workflow Run RO-Crate / W3C PROV conventions.
license: Apache-2.0
source: https://github.com/finos/fluxnova-bpm-platform
see_also:
  - https://fluxnova.finos.org/
  - https://www.w3.org/TR/prov-overview/
  - https://www.researchobject.org/workflow-run-crate/
version: 2.0.0-SNAPSHOT

annotations:
  module: provenance
  purpose: PROV-aligned workflow run provenance for BPMN exports
  prospective: WorkflowDefinition / StepDefinition / ParameterDefinition
  retrospective: WorkflowRun / StepRun / ParameterValue / ProvenanceIncident / ResourceUsage

prefixes:
  fluxnova_bpm_provenance: https://w3id.org/lmodel/fluxnova-bpm-platform/provenance/
  fluxnova_bpm_history: https://w3id.org/lmodel/fluxnova-bpm-platform/history/
  fluxnova_bpm_repository: https://w3id.org/lmodel/fluxnova-bpm-platform/repository/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  bpmn: http://www.omg.org/spec/BPMN/20100524/MODEL#
  dcterms: http://purl.org/dc/terms/
  wrroc: https://w3id.org/ro/terms/workflow-run#

  core: https://w3id.org/lmodel/vulnerability-core/
  d3f: http://d3fend.mitre.org/ontologies/d3fend.owl#
  nvd: https://w3id.org/lmodel/nist-nvd/
  spdx: https://lmodel.github.io/spdx/
  stix: https://w3id.org/lmodel/stix/
  unified_cyber_ontology: https://w3id.org/lmodel/uco-master/
default_prefix: fluxnova_bpm_provenance
default_range: string

imports:
  - linkml:types
  - ../fluxnova_common
  - ../fluxnova_bpm_base
  - ../fluxnova_bpm_runtime
  - ../fluxnova_bpm_identity
  - ../fluxnova_bpmn_model_instance
  - ./fluxnova_bpm_ai_provenance

subsets:
  prospective_provenance:
    description: Provenance entities describing what a workflow is (definitions and contracts).

  retrospective_provenance:
    description: Provenance entities describing what a workflow did (runs, observed values, incidents).

  context_entities:
    description: Supporting entities (agents, environments, runtime components, artifacts, resources).

classes:
  NamedThing:
    abstract: true
    description: Abstract identifiable provenance entity with optional human-readable name and external reference.
    class_uri: fluxnova_bpm_provenance:NamedThing
    slots:
      - id
      - name
      - external_ref

  ProvenanceBundle:
    tree_root: true
    description: Top-level export package for Fluxnova provenance.
    class_uri: fluxnova_bpm_provenance:ProvenanceBundle
    exact_mappings: ["prov:Bundle", "schema:Dataset"]
    in_subset: [context_entities]
    slots:
      - id
      - name
      - generated_at
      - source_system
      - schema_version
      - workflow_definitions
      - workflow_runs
      - agents
      - environments
      - runtime_components
      - workflow_artifacts
      - parameter_values
      - resources

  WorkflowDefinition:
    is_a: NamedThing
    description: BPMN workflow / process definition (prospective provenance).
    class_uri: fluxnova_bpm_provenance:WorkflowDefinition
    exact_mappings:
      - bpmn:Process
      - schema:ComputationalWorkflow
      - fluxnova_bpm_repository:ProcessDefinition
    in_subset: [prospective_provenance]
    slots:
      - definition_version
      - definition_key
      - deployment_id
      - source_model_ref
      - runtime_component
      - steps
      - authors
      - tags

  StepDefinition:
    is_a: NamedThing
    description: BPMN step / activity / event / gateway definition within a workflow.
    class_uri: fluxnova_bpm_provenance:StepDefinition
    exact_mappings:
      - bpmn:FlowNode
      - schema:HowToStep
    in_subset: [prospective_provenance]
    slots:
      - workflow_definition
      - bpmn_type
      - implementation_kind
      - implementation_ref
      - called_element
      - decision_ref
      - form_ref
      - input_parameters
      - output_parameters
      - bpmn_extension_names

  ParameterDefinition:
    is_a: NamedThing
    description: Formal parameter or variable contract for a workflow or step.
    class_uri: fluxnova_bpm_provenance:ParameterDefinition
    exact_mappings:
      - schema:PropertyValueSpecification
      - wrroc:FormalParameter
    in_subset: [prospective_provenance]
    slots:
      - parameter_scope
      - parameter_direction
      - declared_type
      - is_required
      - default_value
      - secret
      - allowed_values

  Agent:
    is_a: NamedThing
    description: Person, organization, system, or service account participating in workflow execution.
    class_uri: fluxnova_bpm_provenance:Agent
    exact_mappings: ["prov:Agent", "schema:Agent"]
    in_subset: [context_entities]
    slots:
      - agent_kind
      - email
      - role
    related_mappings:
      - d3f:Agent
      - spdx:Agent
  Environment:
    is_a: NamedThing
    description: Runtime environment for process execution or export generation.
    class_uri: fluxnova_bpm_provenance:Environment
    exact_mappings: ["schema:SoftwareApplication"]
    in_subset: [context_entities]
    slots:
      - runtime_name
      - runtime_version
      - host
      - region
      - deployment_ref
      - configuration_ref

  RuntimeComponent:
    is_a: NamedThing
    description: Engine, plugin, or service component involved in orchestration.
    class_uri: fluxnova_bpm_provenance:RuntimeComponent
    exact_mappings: ["schema:SoftwareApplication", "prov:SoftwareAgent"]
    in_subset: [context_entities]
    slots:
      - component_kind
      - definition_version
      - endpoint

  WorkflowArtifact:
    is_a: NamedThing
    description: File, payload, or URI referenced by a process definition or execution.
    class_uri: fluxnova_bpm_provenance:WorkflowArtifact
    exact_mappings: ["prov:Entity", "schema:MediaObject"]
    in_subset: [context_entities]
    slots:
      - artifact_kind
      - media_type
      - path_or_uri
      - hash
      - size_in_bytes
      - produced_by_step_run
      - consumed_by_step_runs

  WorkflowRun:
    is_a: NamedThing
    description: Concrete execution of a WorkflowDefinition (retrospective provenance).
    class_uri: fluxnova_bpm_provenance:WorkflowRun
    exact_mappings:
      - prov:Activity
      - schema:CreateAction
      - fluxnova_bpm_history:HistoricProcessInstance
    in_subset: [retrospective_provenance]
    slots:
      - workflow_definition
      - business_key
      - parent_workflow_run
      - status
      - started_at
      - ended_at
      - started_by
      - environment
      - runtime_component
      - input_values
      - output_values
      - step_runs
      - incidents
      - resource_usage
      - tags

  StepRun:
    is_a: NamedThing
    description: Concrete execution of a StepDefinition (retrospective provenance).
    class_uri: fluxnova_bpm_provenance:StepRun
    exact_mappings:
      - prov:Activity
      - schema:CreateAction
      - fluxnova_bpm_history:HistoricActivityInstance
    in_subset: [retrospective_provenance]
    slots:
      - workflow_run
      - step_definition
      - activity_instance_id
      - parent_step_run
      - informed_by
      - status
      - started_at
      - ended_at
      - executed_by
      - environment
      - execution_resource
      - input_values
      - output_values
      - consumed_artifacts
      - produced_artifacts
      - incident_message
      - retries
      - sequence_no

  ParameterValue:
    is_a: NamedThing
    description: Actual observed runtime value of a variable or parameter.
    class_uri: fluxnova_bpm_provenance:ParameterValue
    exact_mappings:
      - schema:PropertyValue
      - prov:Entity
      - fluxnova_bpm_history:HistoricVariableInstance
    in_subset: [retrospective_provenance]
    slots:
      - parameter_definition
      - observed_type
      - parameter_direction
      - serialized_value
      - value_hash
      - observed_at
      - produced_by_step_run
      - consumed_by_step_runs
      - derived_from
      - redacted
      - classification

  ResourceUsage:
    is_a: NamedThing
    description: Resource usage measurement for a workflow run or step run.
    class_uri: fluxnova_bpm_provenance:ResourceUsage
    exact_mappings: ["schema:PropertyValue"]
    in_subset: [retrospective_provenance]
    slots:
      - metric_name
      - metric_value
      - metric_unit
      - measured_for_workflow_run
      - measured_for_step_run
      - execution_resource

  ExecutionResource:
    is_a: NamedThing
    description: Execution resource such as worker, node, queue, container, or database.
    class_uri: fluxnova_bpm_provenance:ExecutionResource
    exact_mappings: ["prov:Entity", "schema:Thing"]
    in_subset: [context_entities]
    slots:
      - resource_kind
      - host
      - endpoint
      - labels

  ProvenanceIncident:
    is_a: NamedThing
    description: Error, escalation, or operational event attached to a workflow run or step run.
    class_uri: fluxnova_bpm_provenance:ProvenanceIncident
    exact_mappings:
      - schema:Action
      - fluxnova_bpm_history:HistoricIncident
    in_subset: [retrospective_provenance]
    slots:
      - incident_status
      - message
      - code
      - observed_at
      - related_step_run
      - related_workflow_run

slots:
  external_ref:
    description: External URI, engine identifier, or source reference for this entity.
    slot_uri: schema:url

  definition_version:
    description: Version string of the workflow or step definition (semantic version of the BPMN model).
    slot_uri: schema:version

  generated_at:
    range: datetime
    description: Timestamp at which the provenance bundle was produced.
    slot_uri: prov:generatedAtTime

  source_system:
    description: Name or identifier of the system that produced the provenance bundle.
    slot_uri: prov:wasAttributedTo

  schema_version:
    description: Version of the provenance schema used for the bundle.
    slot_uri: dcterms:hasVersion

  definition_key:
    description: Stable engine definition key (BPMN process key).

  source_model_ref:
    range: WorkflowArtifact
    description: Reference to the source BPMN/DMN/CMMN model artifact.
    slot_uri: prov:hadPrimarySource

  runtime_component:
    range: RuntimeComponent
    description: Engine or runtime component associated with the entity.
    slot_uri: schema:instrument

  steps:
    range: StepDefinition
    multivalued: true
    inlined_as_list: true
    description: Step definitions belonging to a workflow definition.

  authors:
    range: Agent
    multivalued: true
    description: Authors or owners of the workflow definition (by-reference; declare full agents under
      ProvenanceBundle.agents).

  tags:
    multivalued: true
    description: Free-form tag labels.

  workflow_definition:
    range: WorkflowDefinition
    description: Reference to the owning workflow definition.
    slot_uri: schema:instrument

  bpmn_type:
    range: BPMNElementType
    description: Normalized BPMN element type for the step.

  implementation_kind:
    range: ImplementationKind
    description: Normalized implementation strategy for the step.

  decision_ref:
    description: DMN decision or decision service reference for business rule tasks.

  form_ref:
    description: Form reference for human tasks.

  input_parameters:
    range: ParameterDefinition
    multivalued: true
    inlined_as_list: true
    description: Formal input parameter contracts for the step.

  output_parameters:
    range: ParameterDefinition
    multivalued: true
    inlined_as_list: true
    description: Formal output parameter contracts for the step.

  bpmn_extension_names:
    multivalued: true
    description: Names or identifiers of BPMN extension elements used by the step.

  parameter_scope:
    range: ParameterScope
    description: Scope at which the parameter applies (workflow, step, task, decision, form).

  parameter_direction:
    range: DirectionEnum
    description: Direction of data flow for a parameter (IN, OUT, INOUT, LOCAL).

  declared_type:
    description: Declared variable/parameter type as a string.

  default_value:
    description: Default value for the parameter in string/JSON form.

  secret:
    range: boolean
    description: Indicates that values for this parameter must be redacted on export.

  allowed_values:
    multivalued: true
    description: Enumerated allowed values for the parameter, if constrained.

  agent_kind:
    range: AgentKind
    description: Kind of agent (person, organization, system, service account).

  role:
    multivalued: true
    description: Roles played by the agent in this context.

  runtime_name:
    slot_uri: schema:name
    description: Runtime/platform name (e.g. "Fluxnova BPM Platform").

  runtime_version:
    slot_uri: schema:softwareVersion
    description: Runtime/platform version.

  host:
    description: Hostname or logical host.

  region:
    description: Region or availability zone.

  deployment_ref:
    description: Deployment reference or release identifier (Helm chart URI, image tag, etc.).

  configuration_ref:
    range: WorkflowArtifact
    description: Reference to an artifact containing applied configuration.

  component_kind:
    range: RuntimeComponentKind
    description: Kind of runtime component (engine, REST API, executor, plugin, connector, etc.).

  endpoint:
    description: API or service endpoint URL.

  artifact_kind:
    range: ArtifactKind
    description: Classifier for the kind of artifact (BPMN XML, payload, document, log, etc.).

  media_type:
    slot_uri: schema:encodingFormat
    description: IANA media type / MIME type of the artifact.

  path_or_uri:
    slot_uri: schema:contentUrl
    description: File path or URI locating the artifact content.

  hash:
    description: Content hash or checksum string (algorithm-prefixed, e.g. "sha256:...").

  size_in_bytes:
    range: integer
    slot_uri: schema:contentSize
    description: Size of the artifact content in bytes.

  produced_by_step_run:
    range: StepRun
    description: Step run that produced this artifact or parameter value.
    slot_uri: prov:wasGeneratedBy

  consumed_by_step_runs:
    range: StepRun
    multivalued: true
    description: Step runs that consumed this artifact or parameter value (by-reference).
    slot_uri: prov:used

  parent_workflow_run:
    range: WorkflowRun
    description: Parent workflow run when the run is a sub-process invocation.

  status:
    range: RunStatus
    description: Status of the workflow run or step run.
    slot_uri: schema:actionStatus
    related_mappings:
      - core:status
      - nvd:NVDWorkflowStatus
  incident_status:
    range: IncidentStatus
    description: Lifecycle status of an incident.

  started_at:
    range: datetime
    description: Timestamp when execution started.
    slot_uri: schema:startTime

  ended_at:
    range: datetime
    description: Timestamp when execution ended (absent for running instances).
    slot_uri: schema:endTime

  started_by:
    range: Agent
    description: Agent that initiated the workflow run.
    slot_uri: prov:wasAssociatedWith
    narrow_mappings: ["schema:agent"]
  environment:
    range: Environment
    description: Runtime environment in which the run took place.

  input_values:
    range: ParameterValue
    multivalued: true
    description: Observed input parameter values at the workflow or step boundary (by-reference; declare full values
      under ProvenanceBundle.parameter_values).
    slot_uri: schema:object

  output_values:
    range: ParameterValue
    multivalued: true
    description: Observed output parameter values at the workflow or step boundary (by-reference; declare full values
      under ProvenanceBundle.parameter_values).
    slot_uri: schema:result

  step_runs:
    range: StepRun
    multivalued: true
    inlined_as_list: true
    description: Step run executions belonging to the workflow run.

  incidents:
    range: ProvenanceIncident
    multivalued: true
    inlined_as_list: true
    description: Incidents recorded against the workflow run.

  resource_usage:
    range: ResourceUsage
    multivalued: true
    inlined_as_list: true
    description: Resource usage measurements for the run.

  workflow_run:
    range: WorkflowRun
    description: Parent workflow run for the step run.

  step_definition:
    range: StepDefinition
    description: Step definition this run instantiates.
    slot_uri: schema:instrument

  parent_step_run:
    range: StepRun
    description: Parent step run for nested step executions.

  informed_by:
    range: StepRun
    multivalued: true
    description: Step runs whose completion preceded and informed this step run (by-reference).
    slot_uri: prov:wasInformedBy

  executed_by:
    range: Agent
    description: Agent (assignee, service account, system) that executed the step.
    slot_uri: prov:wasAssociatedWith
    narrow_mappings: ["schema:agent"]
  execution_resource:
    range: ExecutionResource
    description: Resource (pod, container, node, queue) used to execute the step.

  consumed_artifacts:
    range: WorkflowArtifact
    multivalued: true
    description: Artifacts consumed by the step run (by-reference; declare full artifacts under
      ProvenanceBundle.artifacts).
    slot_uri: prov:used

  produced_artifacts:
    range: WorkflowArtifact
    multivalued: true
    description: Artifacts produced by the step run (by-reference; declare full artifacts under
      ProvenanceBundle.artifacts).
    slot_uri: prov:generated

  sequence_no:
    range: integer
    description: Exporter-assigned ordering number for deterministic serialization.

  parameter_definition:
    range: ParameterDefinition
    description: Formal parameter definition this value instantiates.
    slot_uri: schema:exampleOfWork

  observed_type:
    description: Runtime-observed concrete type for the actual value.

  serialized_value:
    range: string
    description: Export-safe serialized value (JSON scalar/string/external reference).

  value_hash:
    description: Hash of the serialized value for deduplication or comparison.

  observed_at:
    range: datetime
    description: Timestamp when the value or event was observed.

  derived_from:
    range: ParameterValue
    multivalued: true
    description: Upstream parameter values from which this value was derived (by-reference).
    slot_uri: prov:wasDerivedFrom

  redacted:
    range: boolean
    description: Whether the serialized value has been redacted for export.

  classification:
    range: DataClassification
    description: Data classification of the value (public, internal, confidential, restricted).

  metric_name:
    description: Metric name (e.g. duration_ms, queue_wait_ms, cpu_seconds, tokens_in).

  metric_value:
    range: decimal
    description: Metric numeric value.

  metric_unit:
    description: UCUM or local unit string for the metric.

  measured_for_workflow_run:
    range: WorkflowRun
    description: Workflow run the measurement is associated with.

  measured_for_step_run:
    range: StepRun
    description: Step run the measurement is associated with.

  resource_kind:
    range: ResourceKind
    description: Kind of execution resource.

  labels:
    multivalued: true
    description: Free-form key=value labels on the resource.
    related_mappings:
      - stix:labels
      - unified_cyber_ontology:tag
  code:
    description: Incident or error code.

  related_step_run:
    range: StepRun
    description: Step run the incident is related to.

  related_workflow_run:
    range: WorkflowRun
    description: Workflow run the incident is related to.

  workflow_definitions:
    range: WorkflowDefinition
    multivalued: true
    inlined_as_list: true
    description: Workflow definitions exported in the bundle.

  workflow_runs:
    range: WorkflowRun
    multivalued: true
    inlined_as_list: true
    description: Workflow runs exported in the bundle.

  agents:
    range: Agent
    multivalued: true
    inlined_as_list: true
    description: Agents referenced by the bundle.

  environments:
    range: Environment
    multivalued: true
    inlined_as_list: true
    description: Environments referenced by the bundle.

  runtime_components:
    range: RuntimeComponent
    multivalued: true
    inlined_as_list: true
    description: Runtime components referenced by the bundle.

  workflow_artifacts:
    range: WorkflowArtifact
    multivalued: true
    inlined_as_list: true
    description: Workflow artifacts referenced by the bundle.

  parameter_values:
    range: ParameterValue
    multivalued: true
    inlined_as_list: true
    description: Parameter value observations referenced by the bundle's workflow_runs and step_runs.

  resources:
    range: ExecutionResource
    multivalued: true
    inlined_as_list: true
    description: Execution resources (workers, pods, queues, hosts) referenced by the bundle's step_runs.

enums:
  RunStatus:
    description: Lifecycle status of a workflow run or step run.
    permissible_values:
      PENDING:
        description: Scheduled but not yet started.
        meaning: schema:PotentialActionStatus
      ACTIVE:
        description: Currently executing.
        meaning: schema:ActiveActionStatus
      COMPLETED:
        description: Finished successfully.
        meaning: schema:CompletedActionStatus
      FAILED:
        description: Terminated with an error.
        meaning: schema:FailedActionStatus
      CANCELLED:
        description: Cancelled before completion.
      SUSPENDED:
        description: Paused; can be resumed.

  IncidentStatus:
    description: Lifecycle status of an incident.
    permissible_values:
      OPEN:
        description: Newly reported, not yet investigated.
      INVESTIGATING:
        description: Currently being investigated or worked on.
      RESOLVED:
        description: Resolved successfully.
      IGNORED:
        description: Acknowledged but not actioned.

  DirectionEnum:
    description: Direction of data flow for a parameter.
    permissible_values:
      IN:
        description: Input parameter consumed by the workflow or step.
      OUT:
        description: Output parameter produced by the workflow or step.
      INOUT:
        description: Read and updated by the workflow or step.
      LOCAL:
        description: Internal local variable not exposed at the boundary.

  ParameterScope:
    description: Scope at which a parameter or variable is defined.
    permissible_values:
      WORKFLOW:
        description: Scoped to the entire workflow.
      STEP:
        description: Scoped to a single step / activity.
      TASK:
        description: Scoped to a user or service task.
      DECISION:
        description: Scoped to a DMN decision.
      FORM:
        description: Scoped to a human-task form.

  AgentKind:
    description: Kind of agent participating in workflow execution.
    permissible_values:
      PERSON:
        description: A natural person.
        meaning: prov:Person
      ORGANIZATION:
        description: An organizational entity.
        meaning: prov:Organization
      SYSTEM:
        description: A software system or automated component.
        meaning: prov:SoftwareAgent
      SERVICE_ACCOUNT:
        description: A non-human service account identity.
        meaning: prov:SoftwareAgent

  RuntimeComponentKind:
    description: Kind of runtime component participating in orchestration.
    permissible_values:
      ENGINE:
        description: The BPMN process engine itself.
      REST_API:
        description: REST API surface fronting the engine.
      JOB_EXECUTOR:
        description: Asynchronous job execution component.
      HISTORY_EXPORTER:
        description: Component that exports historic data.
      PLUGIN:
        description: Engine plugin or extension.
      CONNECTOR:
        description: Integration connector to an external system.
      MODELER_DEPLOYER:
        description: Deployment-time modeler/deployer tool.

  ArtifactKind:
    description: Classifier for the kind of artifact referenced.
    permissible_values:
      BPMN_XML:
        description: BPMN 2.0 XML process model.
      DMN_XML:
        description: DMN XML decision model.
      FORM_SCHEMA:
        description: Form schema (e.g. JSON Schema, embedded form).
      PAYLOAD:
        description: Request/response payload for an integration call.
      DOCUMENT:
        description: Business document handled by the workflow.
      LOG:
        description: Diagnostic log file.
      EXPORT_BUNDLE:
        description: Provenance export bundle file.
      SCREENSHOT:
        description: Screenshot artifact.
      OTHER:
        description: Unclassified artifact kind.

  ImplementationKind:
    description: Normalized implementation strategy for a step.
    permissible_values:
      USER_TASK:
        description: Human user task.
      JAVA_DELEGATE:
        description: Java delegate class implementation.
      EXPRESSION:
        description: Engine expression evaluation.
      SCRIPT:
        description: Inline or referenced script.
      CONNECTOR:
        description: Connector configuration.
      CALL_ACTIVITY:
        description: Call to another process.
      BUSINESS_RULE:
        description: DMN business rule evaluation.
      EXTERNAL_SERVICE:
        description: External worker topic (external task pattern).
      EVENT:
        description: BPMN event handler.
      GATEWAY:
        description: BPMN gateway routing.
      SUBPROCESS:
        description: Embedded subprocess.

  ResourceKind:
    description: Kind of execution resource.
    permissible_values:
      HOST:
        description: A physical or virtual host.
      CONTAINER:
        description: A container instance.
      POD:
        description: A Kubernetes pod.
      NODE:
        description: A cluster node.
      DATABASE:
        description: A database instance.
      QUEUE:
        description: A message queue.
      CLUSTER:
        description: A cluster of nodes.
      THREAD_POOL:
        description: An in-process thread pool.
      EXTERNAL_API:
        description: An external API endpoint.

  BPMNElementType:
    description: Normalized BPMN element type for a step definition.
    permissible_values:
      PROCESS:
        description: A BPMN process element.
      START_EVENT:
        description: Start event.
      END_EVENT:
        description: End event.
      USER_TASK:
        description: User task.
      SERVICE_TASK:
        description: Service task.
      SCRIPT_TASK:
