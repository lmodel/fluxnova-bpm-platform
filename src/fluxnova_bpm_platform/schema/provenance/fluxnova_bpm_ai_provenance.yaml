id: https://w3id.org/lmodel/fluxnova-bpm-platform/ai-provenance
name: fluxnova_bpm_ai_provenance
title: Fluxnova BPM AI Provenance
description: |-
  Retrospective provenance overlay for AI-augmented BPMN workflow steps.

  Extends the generic Fluxnova BPM provenance schema with classes for AI
  model invocations, prompt and tool-call message turns, evaluation results,
  AI datasets, and model artifacts. Tracks what happened during a single
  AI-augmented step run: which model was called, what prompts were sent,
  what tool calls were made, what tokens and cost were consumed, what
  safety flags were raised, and what evaluation passed or failed.

  This overlay is opt-in and NOT pulled into the master Fluxnova BPM
  Platform schema. It is complementary to (and not a replacement for)
  prospective AI governance ontologies such as the IBM AI Atlas Nexus,
  W3C AIRO, DPV-AI, and Croissant: those describe what an AI system IS
  and what risks/controls apply; this overlay records what an AI step
  DID at runtime, inside a BPMN process. Loose coupling to those
  vocabularies is provided via exact_mappings / related_mappings and a
  separate SSSOM crosswalk file.
license: Apache-2.0
source: https://github.com/finos/fluxnova-bpm-platform
see_also:
  - https://fluxnova.finos.org/
  - https://www.w3.org/TR/prov-overview/
  - https://w3id.org/airo
  - https://w3id.org/dpv/ai
  - https://mlcommons.org/croissant/
  - https://www.w3.org/TR/vocab-dqv/
version: 2.0.0-SNAPSHOT

annotations:
  module: ai-provenance
  purpose: Retrospective per-invocation provenance for AI-augmented BPMN steps
  retrospective: AiModelInvocation / PromptMessage / ToolCall / EvaluationResult
  context: AiAgent / AiModelDescriptor / AiDataset / ModelArtifact

prefixes:
  fluxnova_bpm_ai_provenance: https://w3id.org/lmodel/fluxnova-bpm-platform/ai-provenance/
  fluxnova_bpm_provenance: https://w3id.org/lmodel/fluxnova-bpm-platform/provenance/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  prov: http://www.w3.org/ns/prov#
  dcterms: http://purl.org/dc/terms/
  nexus: https://ibm.github.io/ai-atlas-nexus/ontology/
  airo: https://w3id.org/airo#
  dpv: https://w3id.org/dpv#
  dpv_ai: https://w3id.org/dpv/ai#
  dpv_risk: https://w3id.org/dpv/risk#
  dqv: http://www.w3.org/ns/dqv#
  cr: http://mlcommons.org/croissant/
  mls: http://www.w3.org/ns/mls#

default_prefix: fluxnova_bpm_ai_provenance
default_range: string

imports:
  - linkml:types
  - ../fluxnova_common
  - ./fluxnova_bpm_provenance

subsets:
  ai_prospective:
    description: Definitions of AI agents, models, and datasets (prospective AI provenance).
  ai_retrospective:
    description: Per-invocation records of AI model calls, prompts, tool calls, and evaluations.

classes:
  AiAgent:
    is_a: Agent
    description: |-
      Autonomous or semi-autonomous AI agent that acts as an Agent in a Fluxnova
      workflow. Concrete embodiment of one or more AI models exposed through a
      provider endpoint. Distinct from the human, organizational, or system Agent
      kinds declared in the base provenance module.
    class_uri: fluxnova_bpm_ai_provenance:AiAgent
    exact_mappings:
      - airo:AIAgent
      - nexus:AiAgent
      - prov:SoftwareAgent
    related_mappings:
      - dpv_ai:AISystem
    in_subset: [ai_prospective]
    slots:
      - model_family
      - model_name
      - model_version
      - provider
      - endpoint
      - parameter_count
      - context_window_tokens
      - input_modalities
      - output_modalities
      - is_part_of_ai_system

  AiModelDescriptor:
    is_a: RuntimeComponent
    description: |-
      Descriptor of an AI model used as a runtime component. Captures static
      characteristics of the model (family, architecture, parameter count,
      training tokens, context window, supported languages) without prescribing
      how an individual call was made.
    class_uri: fluxnova_bpm_ai_provenance:AiModelDescriptor
    exact_mappings:
      - airo:AIModel
      - nexus:AiModel
      - nexus:LargeLanguageModel
    related_mappings:
      - schema:SoftwareApplication
    in_subset: [ai_prospective]
    slots:
      - model_family
      - architecture
      - parameter_count
      - training_token_count
      - context_window_tokens
      - fine_tuning_description
      - supported_languages
    close_mappings:
      - nexus:LargeLanguageModel
  AiModelInvocation:
    is_a: StepRun
    description: |-
      One concrete invocation of an AI model from a workflow step. Captures the
      runtime call (kind, parameters, prompts, tool calls, response), the
      consumption telemetry (token counts, cost), any safety flags raised, and
      any evaluation results attached. Inherits status, timestamps, parent
      workflow run, sequence number, and incident linkage from StepRun.
    class_uri: fluxnova_bpm_ai_provenance:AiModelInvocation
    exact_mappings:
      - prov:Activity
      - schema:CreateAction
    in_subset: [ai_retrospective]
    slots:
      - invoked_model
      - invocation_kind
      - prompt_messages
      - tool_calls
      - response_message
      - temperature
      - top_p
      - max_tokens
      - total_input_tokens
      - total_output_tokens
      - cost_usd
      - safety_flags
      - evaluation_results

  PromptMessage:
    is_a: NamedThing
    description: |-
      A single message turn in an AI model invocation (system, user, assistant,
      or tool turn). Records the role, the (possibly redacted) content, an
      ordering index inside the invocation, and a data classification.
    class_uri: fluxnova_bpm_ai_provenance:PromptMessage
    related_mappings:
      - schema:Message
    in_subset: [ai_retrospective]
    slots:
      - message_role
      - content
      - content_hash
      - sequence_no
      - redacted
      - classification
      - parent_invocation

  ToolCall:
    is_a: NamedThing
    description: |-
      A single tool / function call made by an AI agent during an invocation.
      Captures the tool name, the provider-assigned call identifier, the
      arguments passed, the result returned, the status of the call, and an
      optional link to the step run that materialized the call.
    class_uri: fluxnova_bpm_ai_provenance:ToolCall
    exact_mappings:
      - schema:Action
    related_mappings:
      - prov:Activity
    in_subset: [ai_retrospective]
    slots:
      - tool_name
      - tool_call_id
      - arguments_json
      - result_json
      - result_artifact
      - called_step_run
      - started_at
      - ended_at
      - status
      - parent_invocation

  EvaluationResult:
    is_a: NamedThing
    description: |-
      Result of a quality or safety evaluation against an AI model invocation.
      Supports human review, LLM-as-judge, deterministic metrics, guardrails,
      and static rule checks. Distinct from offline benchmark scoring such as
      nexus:AiEvalResult (a related but coarser concept).
    class_uri: fluxnova_bpm_ai_provenance:EvaluationResult
    exact_mappings:
      - dqv:QualityMeasurement
      - nexus:AiEvalResult
    related_mappings:
      - mls:ModelEvaluation
      - schema:PropertyValue
    in_subset: [ai_retrospective]
    slots:
      - evaluator_name
      - evaluator_kind
      - metric_name
      - metric_value
      - metric_unit
      - passing
      - evaluated_at
      - evaluated_invocation

  AiDataset:
    is_a: WorkflowArtifact
    description: |-
      Dataset artifact associated with an AI model invocation, an evaluation,
      a training run, or a fine-tuning step. Extends the generic WorkflowArtifact
      class with AI-specific metadata such as dataset kind, record count, license,
      and data classification.
    class_uri: fluxnova_bpm_ai_provenance:AiDataset
    exact_mappings:
      - cr:Dataset
      - nexus:Dataset
      - prov:Entity
      - schema:Dataset
    in_subset: [ai_prospective]
    slots:
      - dataset_kind
      - record_count
      - license_uri
      - classification

  ModelArtifact:
    is_a: WorkflowArtifact
    description: |-
      Persistent model artifact such as a checkpoint, weights file, or model
      card publication. Distinct from AiModelDescriptor: this is a concrete
      file or URI, while AiModelDescriptor is the runtime component used
      during invocation.
    class_uri: fluxnova_bpm_ai_provenance:ModelArtifact
    exact_mappings:
      - schema:SoftwareSourceCode
    related_mappings:
      - nexus:LargeLanguageModel
      - prov:Entity
    in_subset: [ai_prospective]
    slots:
      - model_card_uri
      - weights_uri
      - training_datasets
      - base_model
      - parameter_count

slots:
  model_family:
    description: |-
      Model family or product line (e.g. "GPT-4", "Claude 3", "Llama 3", "Mistral 7B").
    slot_uri: schema:productID

  model_name:
    description: |-
      Concrete model name (e.g. "gpt-4o-2024-05-13", "claude-3-5-sonnet-20240620").
    slot_uri: schema:name

  model_version:
    description: Released or pinned version identifier for the model.
    slot_uri: schema:softwareVersion

  provider:
    description: |-
      Provider or vendor that hosts the model endpoint (e.g. "openai", "anthropic",
      "azure-openai", "vertex-ai", "self-hosted-vllm").

  parameter_count:
    range: integer
    description: Number of model parameters (where disclosed).
    exact_mappings:
      - "nexus:numParameters"

  training_token_count:
    range: integer
    description: Number of tokens used to train the model (where disclosed).
    exact_mappings:
      - "nexus:numTrainingTokens"

  context_window_tokens:
    range: integer
    description: Maximum input context window in tokens.
    exact_mappings:
      - "nexus:contextWindowSize"

  input_modalities:
    range: AiModality
    multivalued: true
    description: Modalities the model accepts as input.
    exact_mappings:
      - "nexus:hasInputModality"

  output_modalities:
    range: AiModality
    multivalued: true
    description: Modalities the model produces as output.
    exact_mappings:
      - "nexus:hasOutputModality"

  is_part_of_ai_system:
    description: |-
      External CURIE or URI reference to a larger AI system this agent belongs
      to (typically modeled in an AI governance vocabulary such as nexus:AiSystem
      or airo:AISystem). String reference rather than typed slot so the AI
      provenance overlay does not pull in a governance ontology.
    related_mappings:
      - airo:AISystem
      - nexus:AiSystem
  architecture:
    description: Architecture family (e.g. "transformer-decoder", "moe", "mamba", "diffusion").

  fine_tuning_description:
    description: Free-text description of fine-tuning applied to the model.

  supported_languages:
    multivalued: true
    description: ISO 639 language tags supported by the model.

  invoked_model:
    range: AiAgent
    description: AI agent that was invoked to produce the step result.
    slot_uri: prov:wasAssociatedWith
    exact_mappings:
      - prov:wasAssociatedWith
  invocation_kind:
    range: AiInvocationKind
    description: Kind of invocation (chat completion, tool use, embedding, etc.).

  prompt_messages:
    range: PromptMessage
    multivalued: true
    inlined_as_list: true
    description: Ordered sequence of prompt messages sent to the model.

  tool_calls:
    range: ToolCall
    multivalued: true
    inlined_as_list: true
    description: Tool / function calls performed by the model during the invocation.

  response_message:
    range: PromptMessage
    inlined: true
    description: |-
      Assistant or tool message returned by the model as the response.
      Inlined as a single PromptMessage with role ASSISTANT or TOOL.

  temperature:
    range: decimal
    description: Sampling temperature requested for the invocation.

  top_p:
    range: decimal
    description: Top-p nucleus sampling parameter.

  max_tokens:
    range: integer
    description: Maximum tokens the model was permitted to generate.

  total_input_tokens:
    range: integer
    description: Total prompt / input tokens consumed by the invocation.

  total_output_tokens:
    range: integer
    description: Total completion / output tokens produced by the invocation.

  cost_usd:
    range: decimal
    description: |-
      Direct provider cost in USD for the invocation, where reported by the
      provider or computed locally from billing rates.

  safety_flags:
    range: SafetyFlag
    multivalued: true
    description: |-
      Safety, policy, or guardrail flags raised by the model, provider, or
      local guardrail layer during the invocation.

  evaluation_results:
    range: EvaluationResult
    multivalued: true
    inlined_as_list: true
    description: Evaluation results attached to the invocation.

  message_role:
    range: MessageRole
    description: Conversational role of the message (system, user, assistant, tool).

  content:
    description: Message content (may be redacted in export).

  content_hash:
    description: |-
      Hash of the message content (algorithm-prefixed, e.g. "sha256:...").
      Used to deduplicate or to attest to a message that has been redacted.

  parent_invocation:
    range: AiModelInvocation
    description: AI model invocation that produced or owns this message or tool call.

  tool_name:
    description: Tool or function name as exposed to the model.

  tool_call_id:
    description: Provider-assigned identifier for the tool call.

  arguments_json:
    description: JSON-serialized arguments passed to the tool.

  result_json:
    description: JSON-serialized result returned by the tool.

  result_artifact:
    range: WorkflowArtifact
    description: Optional artifact reference for large tool outputs.

  called_step_run:
    range: StepRun
    description: Step run that was materialized to execute the tool call, if any.

  evaluator_name:
    description: Name of the evaluator (rubric name, judge model name, metric name).

  evaluator_kind:
    range: EvaluatorKind
    description: Kind of evaluator (human, LLM-as-judge, metric, guardrail, static rule).

  passing:
    range: boolean
    description: Whether the evaluation was considered passing.

  evaluated_at:
    range: datetime
    description: Timestamp when the evaluation was performed.

  evaluated_invocation:
    range: AiModelInvocation
    description: AI model invocation that was evaluated.

  dataset_kind:
    range: DatasetKind
    description: Role of the dataset (training, fine-tuning, evaluation, RAG corpus, ground truth).

  record_count:
    range: integer
    description: Number of records in the dataset.

  license_uri:
    description: URI of the dataset license (e.g. SPDX license URL).
    slot_uri: schema:license
    exact_mappings:
      - schema:license
  model_card_uri:
    description: URI of the model card or model documentation.

  weights_uri:
    description: URI of the model weights or checkpoint.

  training_datasets:
    range: AiDataset
    multivalued: true
    description: Datasets used to train or fine-tune the model.

  base_model:
    range: ModelArtifact
    description: Upstream base model artifact this artifact derives from.
    slot_uri: prov:wasDerivedFrom
    exact_mappings:
      - prov:wasDerivedFrom
enums:
  MessageRole:
    description: Conversational role of a prompt or response message.
    permissible_values:
      SYSTEM:
        description: System-level instruction or persona-setting message.
      USER:
        description: End-user input message.
      ASSISTANT:
        description: Model-generated response message.
      TOOL:
        description: Tool / function result message returned to the model.

  AiModality:
    description: Input or output modality supported by an AI model.
    related_mappings:
      - nexus:Modality
      - airo:Modality
    permissible_values:
      TEXT:
        description: Natural-language text.
      IMAGE:
        description: Still image content.
      AUDIO:
        description: Audio content.
      VIDEO:
        description: Video content.
      MULTIMODAL:
        description: Combined modalities in a single input or output.
      EMBEDDING:
        description: Numeric vector embedding.

  AiInvocationKind:
    description: Kind of AI model invocation performed from a workflow step.
    permissible_values:
      CHAT_COMPLETION:
        description: Multi-turn chat completion call.
      COMPLETION:
        description: Single-turn text completion call.
      EMBEDDING:
        description: Embedding generation call.
      TOOL_USE:
        description: Invocation that includes tool / function calling.
      AGENT_LOOP:
        description: Agentic loop with multiple model + tool turns.
      RETRIEVAL:
        description: Retrieval-augmented generation lookup.
      GUARDRAIL:
        description: Guardrail or policy-check invocation.

  SafetyFlag:
    description: |-
      Safety, policy, or guardrail flag raised by the model, the provider, or
      a local guardrail layer during an AI model invocation. Mapped to
      dpv-risk terms where a stable upstream match exists.
    permissible_values:
      NONE:
        description: No safety flag was raised.
      POLICY_VIOLATION:
        description: |-
          Output or input violates a configured content policy.
      HALLUCINATION_SUSPECTED:
        description: |-
          Output was flagged as likely hallucinated or unsupported by retrieved evidence.
      JAILBREAK_ATTEMPT:
        description: Input was flagged as attempting to bypass the system instruction.
      PII_LEAK:
        description: Output or input contained personally identifiable information.
      PROMPT_INJECTION:
        description: Input was flagged as attempting to override the system instruction.
      TOXICITY:
        description: Output or input was flagged as toxic.

  DatasetKind:
    description: Role of a dataset relative to an AI model.
    permissible_values:
      TRAINING:
        description: Used to train the model.
      FINE_TUNING:
        description: Used to fine-tune the model.
      EVALUATION:
        description: Used to evaluate the model.
      RAG_CORPUS:
        description: Used as a retrieval corpus at inference time.
      GROUND_TRUTH:
        description: Used as ground-truth labels for evaluation or supervised tuning.

  EvaluatorKind:
    description: Kind of evaluator that produced an EvaluationResult.
    permissible_values:
      HUMAN_REVIEW:
        description: Human reviewer-assigned score or pass/fail.
      LLM_AS_JUDGE:
        description: A separate LLM invocation that scored the evaluated invocation.
      METRIC:
        description: A deterministic numeric metric (ROUGE, BLEU, exact match, etc.).
      GUARDRAIL:
        description: A guardrail or policy-check layer.
      STATIC_RULE:
        description: A static rule check (regex, schema validation, etc.).
