id: https://w3id.org/lmodel/fluxnova-bpm-platform/provenance/strict
name: fluxnova_bpm_provenance_strict
title: Fluxnova BPM Provenance — Strict Profile
description: |-
  Production-hardening overlay for the Fluxnova BPM provenance schema.
  Tightens cardinality, marks export-critical slots required, adds patterns
  for identifiers and endpoints, and enforces conditional rules (e.g.
  terminal runs must carry an end timestamp).

  This overlay is opt-in: it is NOT pulled into the master
  fluxnova_bpm_platform.yaml schema. Consumers that need stricter
  validation import this module directly.
license: Apache-2.0
source: https://github.com/finos/fluxnova-bpm-platform
see_also:
  - https://fluxnova.finos.org/
version: 2.0.0-SNAPSHOT

annotations:
  module: provenance-strict
  purpose: Validation-only overlay for production-quality provenance exports

prefixes:
  fluxnova_bpm_provenance_strict: https://w3id.org/lmodel/fluxnova-bpm-platform/provenance/strict/
  fluxnova_bpm_provenance: https://w3id.org/lmodel/fluxnova-bpm-platform/provenance/
  linkml: https://w3id.org/linkml/

default_prefix: fluxnova_bpm_provenance_strict
default_range: string

imports:
  - linkml:types
  - ./fluxnova_bpm_provenance
  - ./fluxnova_bpm_ai_provenance


classes:
  ProvenanceBundle:
    slot_usage:
      id:
        required: true
      name:
        required: true
      generated_at:
        required: true
      source_system:
        required: true
      schema_version:
        required: true
      workflow_definitions:
        required: true
      workflow_runs:
        required: true

  WorkflowDefinition:
    slot_usage:
      id:
        required: true
      name:
        required: true
      definition_key:
        required: true
        pattern: "^[A-Za-z0-9._:-]+$"
      definition_version:
        required: true
      deployment_id:
        pattern: "^[A-Za-z0-9._:-]+$"
      runtime_component:
        required: true
      steps:
        required: true
        multivalued: true
      source_model_ref:
        required: true

  StepDefinition:
    slot_usage:
      id:
        required: true
      name:
        required: true
      workflow_definition:
        required: true
      bpmn_type:
        required: true
      implementation_kind:
        required: true

  ParameterDefinition:
    slot_usage:
      id:
        required: true
      name:
        required: true
      parameter_scope:
        required: true
      parameter_direction:
        required: true
      declared_type:
        required: true
      is_required:
        required: true
      secret:
        required: true

  WorkflowRun:
    slot_usage:
      id:
        required: true
      name:
        required: true
      workflow_definition:
        required: true
      business_key:
        pattern: "^[A-Za-z0-9._:/-]+$"
      status:
        required: true
      started_at:
        required: true
      environment:
        required: true
      runtime_component:
        required: true
      step_runs:
        required: true
    rules:
      - description: Terminal workflow runs (COMPLETED, FAILED, CANCELLED) must carry ended_at.
        preconditions:
          slot_conditions:
            status:
              any_of:
                - equals_string: COMPLETED
                - equals_string: FAILED
                - equals_string: CANCELLED
        postconditions:
          slot_conditions:
            ended_at:
              required: true

  StepRun:
    slot_usage:
      id:
        required: true
      workflow_run:
        required: true
      step_definition:
        required: true
      activity_instance_id:
        required: true
        pattern: "^[A-Za-z0-9._:-]+$"
      status:
        required: true
      started_at:
        required: true
      sequence_no:
        required: true
        minimum_value: 1
    rules:
      - description: Terminal step runs (COMPLETED, FAILED, CANCELLED) must carry ended_at.
        preconditions:
          slot_conditions:
            status:
              any_of:
                - equals_string: COMPLETED
                - equals_string: FAILED
                - equals_string: CANCELLED
        postconditions:
          slot_conditions:
            ended_at:
              required: true

  ParameterValue:
    slot_usage:
      id:
        required: true
      parameter_definition:
        required: true
      observed_type:
        required: true
      parameter_direction:
        required: true
      serialized_value:
        required: true
      observed_at:
        required: true
      redacted:
        required: true
      classification:
        required: true

  ResourceUsage:
    slot_usage:
      id:
        required: true
      metric_name:
        required: true
      metric_value:
        required: true
        minimum_value: 0
      metric_unit:
        required: true

  RuntimeComponent:
    slot_usage:
      endpoint:
        pattern: "^https?://.+"

  WorkflowArtifact:
    slot_usage:
      size_in_bytes:
        minimum_value: 0

  ProvenanceIncident:
    slot_usage:
      id:
        required: true
      incident_status:
        required: true
      message:
        required: true
      observed_at:
        required: true
