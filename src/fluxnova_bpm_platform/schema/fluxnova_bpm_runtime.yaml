  process_definition_id:
    range: string
    description: Reference to the process definition.

  process_definition_key:
    range: string
    description: Key of the process definition.

  process_instance_id:
    range: string
    description: Reference to the process instance.

  retries:
    range: integer
    description: Number of retries this job has left. Whenever the jobexecutor fails to execute the job, this value is decremented.
