    annotations:
      sql_column: RETRIES_

  root_cause_incident_id:
    range: string
    description: Id of the root incident on which this transitive incident has been triggered.
    annotations:
      sql_column: ROOT_CAUSE_INCIDENT_ID_

  sentry_id:
    range: string
    description: Reference to the sentry.
    annotations:
      sql_column: SENTRY_ID_

  sequence_counter:
    range: integer
